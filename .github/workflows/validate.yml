name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Validate skills
        run: bun scripts/validate-skills.mjs
      - name: Verify behavior fixtures
        run: bun scripts/verify-eval-fixtures.mjs
